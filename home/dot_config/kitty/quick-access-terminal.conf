# Drop-down terminal, toggled with `kitten quick-access-terminal`
# (bound to alt - return in skhd)

# Slide down from the top edge, 20 lines tall, full width
edge top
lines 50

background_opacity 1.0
hide_on_focus_loss yes

# The window inherits kitty.conf; override individual options like:
# kitty_override font_size=16
